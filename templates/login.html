{% extends 'base.html' %}
{% block title %}Login — EDC{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-bg">
  <div class="auth-glow"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">EDC</div>
      <p class="logo-sub">Elite Digital Capital</p>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your account</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
  </div>
</div>
{% endblock %}
